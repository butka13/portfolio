name: Deploy to GitHub Pages

# Publishes the site automatically on every push to main.
on:
  push:
    branches: [main]
  workflow_dispatch:

# Permissions the GitHub Pages deploy needs
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one deploy at a time; let a running one finish
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          # Auto-enable Pages (build type = GitHub Actions) if not already set up,
          # so the first deploy doesn't fail with "Get Pages site failed / Not Found".
          enablement: true

      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          # The whole repo is the static site (index.html at root)
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
